<!DOCTYPE html>
<html>

<head>

<title>Work Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Work Tracker</h2>

<div id="topBar">

<div>
Work From Office % :
<span id="attendancePercent" class="indicator">0%</span>
</div>

<button onclick="exportExcel()">Export Excel</button>

</div>

<div id="layout">

<div id="calendar"></div>

<div id="sidePanel">

<h3 id="panelDate">Select a Day</h3>

<label>Attendance</label>

<select id="attendanceSelect">

<option value="wfh">Work From Home</option>
<option value="wfo">Work From Office</option>
<option value="leave">Leave</option>
<option value="holiday">Holiday</option>

</select>

<h4>Tasks</h4>

<table id="taskTable">

<thead>
<tr>
<th>Task</th>
<th>Time</th>
<th></th>
</tr>
</thead>

<tbody id="taskList"></tbody>

<tfoot>
<tr>
<td><input id="taskName"></td>
<td><input id="taskTime" placeholder="3h 10m"></td>
<td><button onclick="addTask()">➕</button></td>
</tr>
</tfoot>

</table>

<hr>

<div id="timeSummary">
Logged: 0h 0m | Remaining: 7h 0m
</div>

<button onclick="saveDay()">Save Day</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
