<!DOCTYPE html>
<html>

<head>

<title>Work Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>Work Tracker</h2>

<div id="topBar">
WFO % : <span id="attendancePercent">0%</span>
</div>

<div id="layout">

<div id="calendar"></div>

<div id="sidePanel">

<div id="noSelection">
Click a date
</div>

<div id="dayDetails" style="display:none">

<h3 id="panelDate"></h3>

<label>Attendance</label>

<select id="attendanceSelect">

<option value="wfh">WFH</option>
<option value="wfo">WFO</option>
<option value="leave">Leave</option>

</select>

<div id="leaveOptions" style="display:none">

<label>Leave Type</label>

<select id="leaveType">

<option value="full">Full Day</option>
<option value="half">Half Day</option>
<option value="holiday">Holiday</option>

</select>

<label>Comment</label>

<input id="commentInput">

</div>

<h4>Tasks</h4>

<table id="taskTable">

<thead>
<tr>
<th>Task</th>
<th>Time</th>
<th></th>
</tr>
</thead>

<tbody id="taskList"></tbody>

<tfoot>

<tr>

<td><input id="taskName"></td>

<td><input id="taskTime" placeholder="3h 10m"></td>

<td><button onclick="addTask()">+</button></td>

</tr>

</tfoot>

</table>

<div id="timeSummary"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
